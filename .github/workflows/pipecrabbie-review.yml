name: pipecrabbie-bot review

# Ask pipecrabbie-bot for a review either way:
#   * Request a review from pipecrabbie-bot in the GitHub UI
#     (Reviewers -> pipecrabbie-bot), or
#   * Mention "@pipecrabbie-bot" in a pull-request comment.
# Claude then leaves the review on the PR.
#
# Auth uses two secrets:
#   * CLAUDE_CODE_OAUTH_TOKEN — generated locally with `claude setup-token`;
#     authenticates Claude (the model).
#   * PIPECRABBIE_BOT_PAT — pipecrabbie-bot's personal access token (repo +
#     pull-requests scope); passed as github_token so the review is posted as
#     pipecrabbie-bot rather than github-actions.

on:
  pull_request:
    types: [review_requested]
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]

# Governs the default GITHUB_TOKEN. GitHub API writes go through the bot PAT
# below, but the checkout still needs read access.
permissions:
  contents: read

concurrency:
  group: pipecrabbie-review-${{ github.event.pull_request.number || github.event.issue.number }}
  cancel-in-progress: false

jobs:
  review:
    # Run when a review is requested from pipecrabbie-bot via the UI, or when the
    # bot is mentioned in a pull-request comment (not a plain issue).
    if: >-
      (github.event_name == 'pull_request' &&
       github.event.requested_reviewer.login == 'pipecrabbie-bot') ||
      (github.event_name == 'issue_comment' &&
       github.event.issue.pull_request &&
       contains(github.event.comment.body, '@pipecrabbie-bot')) ||
      (github.event_name == 'pull_request_review_comment' &&
       contains(github.event.comment.body, '@pipecrabbie-bot'))
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - name: Review with pipecrabbie-bot
        uses: anthropics/claude-code-action@v1
        with:
          # Claude auth from `claude setup-token`.
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          # Act as pipecrabbie-bot so the review is attributed to the bot.
          github_token: ${{ secrets.PIPECRABBIE_BOT_PAT }}
          prompt: |
            REPO: ${{ github.repository }}
            PR NUMBER: ${{ github.event.pull_request.number || github.event.issue.number }}

            You were asked to review this pull request. The PR branch is already
            checked out in the current working directory.

            If a comment triggered you, read it first and honor any specific
            asks in it. Then review the PR with a focus on:
            - Correctness and potential bugs
            - Code quality and adherence to the repo's conventions
              (see AGENTS.md, ARCHITECTURE.md, CONTRIBUTING.md)
            - Security and performance implications, especially for the
              audio/DSP hot paths

            Leave your feedback as a GitHub review:
            - Use `mcp__github_inline_comment__create_inline_comment`
              (with `confirmed: true`) for specific line-level issues.
            - Use `gh pr review` to submit the overall review verdict and
              summary (comment; only request changes for real blockers).
            Post your findings as GitHub review comments — do not return the
            review text as a chat message.
          claude_args: |
            --allowedTools "mcp__github_inline_comment__create_inline_comment,Bash(gh pr review:*),Bash(gh pr comment:*),Bash(gh pr diff:*),Bash(gh pr view:*)"
