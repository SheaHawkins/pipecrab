name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
      - uses: Swatinem/rust-cache@v2
      # cpal's Linux (ALSA) backend needs the libasound headers to build.
      - run: sudo apt-get update && sudo apt-get install -y libasound2-dev
      - run: cargo test --workspace
      # Portability gate. The sans-IO core, the runtime-agnostic async layer, and
      # every platform-neutral trait crate must compile for the browser — no
      # host-only dependency may creep in. Only concrete/native backends are
      # allowed to be host-specific (and cpal happens to ship a wasm backend, so
      # even it is checked here).
      #
      # The sans-IO core is pure logic — no async, no I/O — so it must build everywhere.
      - run: cargo check -p pipecrab-core --target wasm32-unknown-unknown
      # The runtime must stay executor-agnostic and build for the browser.
      - run: cargo check -p pipecrab-runtime --target wasm32-unknown-unknown
      # The audio I/O trait crate is platform-neutral and must build for the browser too.
      - run: cargo check -p pipecrab-audio --target wasm32-unknown-unknown
      # The STT seam is only the Transcriber trait plus its adapter — no engine — so
      # it must build for the browser, where the engine is Transformers.js in a Worker.
      - run: cargo check -p pipecrab-stt --target wasm32-unknown-unknown
      # The cpal backend is universal (cpal ships a WebAudio/wasm backend), so it
      # must build for wasm as well — no platform gate.
      - run: cargo check -p pipecrab-audio-cpal --target wasm32-unknown-unknown
      # The VAD seam is only the VoiceActivityDetector trait — no engine — so it
      # must build for the browser too, mirroring the STT seam.
      - run: cargo check -p pipecrab-vad --target wasm32-unknown-unknown
      # The model crates select their engine by target: on wasm they pull in the
      # browser (`-web`) backend, so checking them here guards that wiring stays
      # wasm-clean.
      - run: cargo check -p pipecrab-stt-moonshine --target wasm32-unknown-unknown
      - run: cargo check -p pipecrab-vad-silero --target wasm32-unknown-unknown
