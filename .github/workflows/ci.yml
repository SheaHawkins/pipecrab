name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
      - uses: Swatinem/rust-cache@v2
      # cpal's Linux (ALSA) backend needs the libasound headers to build.
      - run: sudo apt-get update && sudo apt-get install -y libasound2-dev
      - run: cargo test --workspace
      # The runtime must stay executor-agnostic and build for the browser.
      - run: cargo check -p pipecrab-runtime --target wasm32-unknown-unknown
      # The audio I/O interface is platform-neutral and must build for the browser too.
      - run: cargo check -p pipecrab-audio --target wasm32-unknown-unknown
      # The cpal backend is universal (cpal ships a WebAudio/wasm backend), so it
      # must build for wasm as well — no platform gate.
      - run: cargo check -p pipecrab-audio-cpal --target wasm32-unknown-unknown
