# Conventional-commit enforcement for cocogitto (https://cocogitto.io), run by
# .github/workflows/conventional-commits.yml on every pull request.
#
# The allowed commit types are cocogitto's Angular defaults, which are exactly
# the set documented in AGENTS.md: build, chore, ci, docs, feat, fix, perf,
# refactor, revert, style, test. Any other type fails `cog check`.
#
# Merge commits are exempt so a plain `Merge branch ...` commit created by a
# non-fast-forward merge doesn't trip the gate.
ignore_merge_commits = true
