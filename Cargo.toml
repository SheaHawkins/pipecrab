[workspace]
resolver = "2"
members = ["crates/pipecrab-core", "crates/pipecrab-runtime", "crates/pipecrab", "crates/pipecrab-audio", "crates/test-util"]

[workspace.package]
version = "0.1.0"
edition = "2021"
rust-version = "1.75"
license = "MIT"

[workspace.dependencies]
pipecrab-core    = { path = "crates/pipecrab-core" }
pipecrab-runtime = { path = "crates/pipecrab-runtime" }
pipecrab-audio   = { path = "crates/pipecrab-audio" }
pipecrab-test-util = { path = "crates/test-util" }
