[workspace]
resolver = "2"
members = ["crates/pipecrab-core", "crates/pipecrab"]

[workspace.package]
version = "0.1.0"
edition = "2021"
rust-version = "1.75"
license = "MIT"

[workspace.dependencies]
pipecrab-core = { path = "crates/pipecrab-core", version = "0.1.0" }
tokio		  = { version = "1",   default-features = false }
tokio-util	  = { version = "0.7", default-features = false }
async-trait   = "0.1"
