[package]
name = "pipecrab"
description = "Sans-IO voice-agent pipelines with a runtime-agnostic async layer bundled in."
version.workspace = true
edition.workspace = true
rust-version.workspace = true
license.workspace = true
repository.workspace = true

# The umbrella facade: re-exports core + runtime. The facade layer sits above
# the trait crates (may depend on core/runtime/trait; nothing lower depends back
# on it).
[package.metadata.pipecrab]
layer = "facade"

[dependencies]
pipecrab-core = { workspace = true }
pipecrab-runtime = { workspace = true }
